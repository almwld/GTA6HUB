name: 🔥 Prometheus CI/CD - Build Only

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: 🚀 Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود من المستودع
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # 2. تثبيت Flutter
      - name: 💙 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # 3. تثبيت الحزم (Dependencies)
      - name: 📦 Install Dependencies
        run: flutter pub get

      # 4. بناء نسخة APK مباشرة (تجاوز المحلل)
      - name: 🛠️ Build Release APK
        run: flutter build apk --release --obfuscate --split-debug-info=./debug-info

      # 5. رفع ملف APK كـ Artifact
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gta6hub-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
