name: 🔥 Prometheus CI/CD - Split-ABI Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Force Rename Project
        run: sed -i 's/^name:.*/name: gta6hub/' pubspec.yaml

      - name: 💙 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: 🛠️ Regenerate Android Shell
        run: |
          rm -rf android
          flutter create --platforms=android .

      - name: 📦 Build Split APKs
        run: |
          flutter pub get
          flutter build apk --release --split-per-abi --obfuscate --split-debug-info=./debug-info

      - name: 📤 Upload All Split APKs
        uses: actions/upload-artifact@v4
        with:
          name: gta6hub-apks
          path: build/app/outputs/flutter-apk/app-*.apk
